


  <div class="slide-status">
    <span class="status-num">{{ statusText }}</span>
    <div class="status-line"></div>
  </div>

@for (slide of slides; track slide.bg; let i = $index) {
  <div
    class="slide"
    [class.active]="i === currentIndex"
  >
    <div class="slide-bg" [style.background-image]="'url(' + slide.bg + ')'"></div>
    <div class="slide-content">
      <p class="slide-label">{{ slide.label }}</p>
      <h2 class="slide-title" [innerHTML]="slide.title"></h2>
      <p class="slide-desc">{{ slide.desc }}</p>
      <div class="slide-actions">
        <a [routerLink]="['/destinos', slide.id]" class="btn-detail">Ver detalles</a>
        <a [routerLink]="['/reservas']" [queryParams]="{ destinoId: slide.id }" class="btn-reserve">Reservar</a>
      </div>
    </div>
  </div>
}

  <button class="arrow" id="prevBtn" aria-label="Anterior" (click)="goTo(currentIndex - 1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="arrow" id="nextBtn" aria-label="Siguiente" (click)="goTo(currentIndex + 1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

<div class="dots">
  @for (slide of slides; track slide.bg; let i = $index) {
    <div
      class="dot"
      [class.active]="i === currentIndex"
      (click)="goTo(i)"
    ></div>
  }
</div>

<div class="thumbnails">
  @for (slide of slides; track slide.bg; let i = $index) {
    <div
      class="thumb"
      [class.active]="i === currentIndex"
      (click)="goTo(i)"
    >
      <div class="thumb-bg" [style.background-image]="'url(' + slide.thumb + ')'"></div>
      <span class="thumb-name">{{ slide.name }}</span>
    </div>
  }
