<section class="section-content">

    <div class="toolbar">
        <div class="search-wrap">
            <span class="si">🔍</span>
            <input class="search-input" type="text" [(ngModel)]="busqueda" placeholder="Buscar destino...">
        </div>
        <button class="btn-primary" (click)="abrir()">+ Nuevo Destino</button>
    </div>

    @if (formVisible) {
    <div class="form-card">
        <h3>{{ editingId ? 'Editar Destino' : 'Nuevo Destino' }}</h3>
        <div class="form-grid">
            <div class="fg"><label>Label</label><input type="text" [(ngModel)]="fDestino.label"></div>
            <div class="fg"><label>Título *</label><input type="text" [(ngModel)]="fDestino.title"></div>
            <div class="fg"><label>Nombre (slug) *</label><input type="text" [(ngModel)]="fDestino.name"></div>
            <div class="fg full"><label>Descripción</label><textarea [(ngModel)]="fDestino.desc" rows="3"></textarea>
            </div>
            <div class="fg"><label>Imagen Background (URL)</label><input type="text" [(ngModel)]="fDestino.bg"></div>
            <div class="fg"><label>Imagen Thumb (URL)</label><input type="text" [(ngModel)]="fDestino.thumb"></div>

            <div class="fg">
                <label>Vehículo Asignado</label>
                <select [(ngModel)]="fDestino.idAuto">
                    <option value="">Sin vehículo asignado</option>
                    @for (a of autos; track a.id) {
                    <option [value]="a.id">
                        {{ a.placa }} — {{ a.marca }} {{ a.modelo }}
                    </option>
                    }
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
            <button class="btn-save" (click)="guardar()">Guardar Destino</button>
        </div>
    </div>
    }

    <div class="destinos-grid">
        @for (d of filtrados(); track d.id) {
        <div class="destino-card">
            <div class="destino-img" [style.background-image]="'url(' + (d.bg || '') + ')'">
                <span class="destino-label">{{ d.label || 'Destino' }}</span>
            </div>
            <div class="destino-body">
                <h4>{{ d.title }}</h4>
                <p>{{ d.desc }}</p>
                <span class="destino-name">🏷 {{ d.name }}</span>

                <div class="destino-auto">
                    <strong>Vehículo:</strong> {{ getAutoInfo(d.idAuto) }}
                </div>
            </div>
            <div class="destino-actions">
                <button class="btn-ico edit" (click)="abrir(d)">✏️</button>
                <button class="btn-ico del" (click)="eliminar(d)">🗑️</button>
            </div>
        </div>
        }
        @if (destinos.length === 0) {
        <p class="td-empty">No hay destinos registrados</p>
        }
    </div>
</section>
